name: week1_day5_simulation_scenes
description: 第1周第5天仿真器功能验证场景，同时预留论文级实验元数据。
run_mode: week1_day5_function_check
paper_ready_metadata: true
global_seed: 20260625
num_scenes: 20
scene_duration_sec: 7.0
note: 当前仅生成20个测试场景，用于验证仿真器功能。论文级 E1～E10 每组50/100场景将在后续脚本中生成。
planned_next_experiments:
  E1:
    task: single_source_localization
    variable: num_mics
    values:
    - mic_4
    - mic_6
    - mic_8
    - mic_12
    paper_sample_size_per_group: 100
    metrics:
    - MAE_cm
    - P90_cm
    - Hit@10cm
  E2:
    task: single_source_localization
    variable: layout
    values:
    - layout_corners_8
    - layout_sides_8
    - layout_single_side_8
    - layout_compact_8
    paper_sample_size_per_group: 100
    metrics:
    - error_cm
    - runtime_sec
  E3:
    task: single_source_localization
    variable: snr_db
    values:
    - 0
    - 5
    - 10
    - 20
    - 30
    paper_sample_size_per_group: 100
    metrics:
    - error_cm
    - miss_rate
  E4:
    task: dual_source_localization
    variable: source_distance_cm
    values:
    - 10
    - 20
    - 30
    - 50
    - 80
    paper_sample_size_per_group: 100
    metrics:
    - dual_source_hit_rate
    - false_alarm_rate
  E5:
    task: localization_rt60
    variable: rt60_sec
    values:
    - 0.1
    - 0.3
    - 0.5
    - 0.7
    paper_sample_size_per_group: 100
    metrics:
    - error_cm
    - peak_ratio
  E6:
    task: reconstruction
    variable: method
    values:
    - single_channel
    - DAS
    - MVDR
    - LCMV
    paper_sample_size_per_group: 100
    metrics:
    - SI_SDRi
    - LogMel_distance
  E7:
    task: reconstruction_position_error
    variable: position_error_cm
    values:
    - 0
    - 5
    - 10
    - 15
    paper_sample_size_per_group: 100
    metrics:
    - SI_SDRi_drop
  E8:
    task: joint_localization_and_separation
    variable: num_active_sources
    values:
    - 1
    - 2
    - 3
    paper_sample_size_per_group: 100
    metrics:
    - joint_success_rate
  E9:
    task: deep_method
    variable: position_encoding
    values:
    - none
    - with_position
    - position_perturbation
    paper_sample_size_per_group: unified_test_set
    metrics:
    - SI_SDRi
    - spectral_error
  E10:
    task: complexity
    variable: grid_and_num_mics
    values: multiple_combinations
    paper_sample_size_per_group: unified_hardware
    metrics:
    - real_time_factor
    - memory_mb
