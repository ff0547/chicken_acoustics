notes:
- mic_4/mic_6/mic_8/mic_12 用于 E1 麦克风数量实验。
- layout_corners_8/layout_sides_8/layout_single_side_8/layout_compact_8 用于 E2 布局实验。
- 所有布局均位于 1.20 × 0.75 × 0.60 m 鸡笼局部坐标范围内。
- 所有麦克风默认安装高度为 z=0.50 m。
